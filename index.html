<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Vocab Trainer — Leaders 300</title>

<!-- Home-screen / PWA setup -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16233a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vocab Trainer">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
  :root{
    --wood-dark:#16233a;
    --wood-mid:#1f3155;
    --paper:#eef2f8;
    --paper-shadow:#c3d2e8;
    --ink:#1c2e4a;
    --ink-light:#2d4570;
    --stamp-red:#c0392b;
    --stamp-green:#2e9e5b;
    --pencil:#2a3548;
    --muted:#66799a;
    --accent:#3567b7;
    --accent-hover:#4779c9;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  html{ -webkit-text-size-adjust:100%; }
  body{
    background:
      radial-gradient(ellipse at 50% 0%, var(--wood-mid) 0%, var(--wood-dark) 60%),
      repeating-linear-gradient(90deg, rgba(0,0,0,0.08) 0px, rgba(0,0,0,0.08) 1px, transparent 1px, transparent 26px);
    background-color:var(--wood-dark);
    min-height:100vh;
    min-height:100dvh;
    font-family: -apple-system, 'Segoe UI', Arial, Helvetica, sans-serif;
    font-size:17px;
    color:var(--pencil);
    display:flex;
    justify-content:center;
    padding:max(28px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) max(60px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
    overscroll-behavior-y:contain;
    -webkit-tap-highlight-color:transparent;
  }
  button, .choice, .mode-card{
    touch-action:manipulation;
    -webkit-touch-callout:none;
  }
  input.recall-input{ -webkit-user-select:text; }
  .wrap{width:100%;max-width:640px;}
  .masthead{
    text-align:center;
    color:#dbe6f5;
    margin-bottom:22px;
  }
  .masthead .kicker{
    font-family:inherit;
    letter-spacing:3px;
    font-size:13px;
    color:#9fb8e0;
    text-transform:uppercase;
    font-weight:600;
  }
  .masthead h1{
    font-size:34px;
    margin:6px 0 2px;
    font-weight:700;
    letter-spacing:0.2px;
  }
  .masthead .sub{
    font-family:inherit;
    font-size:14px;
    color:#7f93b8;
  }
  .card{
    background:var(--paper);
    border-radius:2px;
    box-shadow: 0 14px 0 -6px var(--paper-shadow), 0 18px 30px rgba(10,20,40,0.45);
    padding:26px 26px 22px;
    position:relative;
    background-image:
      linear-gradient(var(--paper), var(--paper)),
      repeating-linear-gradient(180deg, transparent 0 33px, rgba(60,90,150,0.08) 34px);
  }
  .card::before{
    content:"";
    position:absolute; left:22px; top:0; bottom:0; width:1px;
    background:rgba(53,103,183,0.35);
  }
  .catalog-row{
    display:flex; justify-content:space-between; align-items:baseline;
    font-family:inherit; font-size:13px; letter-spacing:0.5px; font-weight:600;
    color:var(--muted); text-transform:uppercase; margin-bottom:14px;
    border-bottom:1px dashed #b8c8e0; padding-bottom:8px;
  }
  h2.section-title{
    font-family:inherit;
    font-size:15px; letter-spacing:1px; text-transform:uppercase; font-weight:700;
    color:var(--ink); margin:0 0 14px;
  }
  .btn{
    font-family:inherit;
    letter-spacing:0.5px;
    text-transform:uppercase;
    font-size:15px;
    font-weight:600;
    background:var(--accent);
    color:#f5f9ff;
    border:none;
    padding:12px 16px;
    border-radius:6px;
    cursor:pointer;
    transition:transform .12s ease, background .15s ease, box-shadow .15s ease;
  }
  .btn:hover{background:var(--accent-hover); transform:translateY(-2px); box-shadow:0 6px 14px rgba(53,103,183,0.35);}
  .btn:active{transform:translateY(0); box-shadow:none;}
  .btn.secondary{background:transparent;color:var(--ink);border:1px solid var(--ink);}
  .btn.secondary:hover{background:rgba(47,62,99,0.08); box-shadow:none;}
  .btn.red{background:var(--stamp-red);}
  .btn.red:hover{background:#b8493a;}
  .btn.green{background:var(--stamp-green);}
  .btn.green:hover{background:#4c7c58;}
  .btn:disabled{opacity:0.4;cursor:not-allowed;}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;}

  .mode-grid{display:flex;flex-direction:column;gap:14px;margin-top:6px;}
  .mode-card{
    border:1.5px solid #c3d2e8; padding:16px 16px 14px; border-radius:10px;
    display:flex; justify-content:space-between; align-items:center; gap:14px;
    cursor:pointer; background:rgba(255,255,255,0.15); position:relative;
    transition:background .16s ease, border-color .16s ease, transform .16s ease, box-shadow .16s ease;
  }
  .mode-card:hover{
    background:rgba(255,255,255,0.42); border-color:var(--accent);
    transform:translateY(-3px);
    box-shadow:0 10px 22px rgba(20,40,80,0.28);
  }
  .mode-card:active{transform:translateY(-1px) scale(.99); box-shadow:0 4px 10px rgba(20,40,80,0.22);}
  .mode-card .mtitle{font-size:20px;color:var(--ink);margin:0 0 4px;font-weight:700;}
  .mode-card .mdesc{font-family:inherit;font-size:14px;color:var(--muted);line-height:1.5;}
  .mode-card .mnum{font-family:inherit;font-size:24px;color:var(--paper-shadow);font-weight:700;transition:color .16s ease;}
  .mode-card:hover .mnum{color:var(--accent);}
  .mode-card.locked{cursor:pointer; opacity:0.72;}
  .mode-card.locked:hover{background:rgba(255,255,255,0.2); border-color:#c3d2e8; transform:none; box-shadow:none;}
  .mode-card.locked .mtitle{color:var(--muted);}
  .mode-card.locked-shake{animation:cardShake .4s ease;}
  @keyframes cardShake{
    10%,90%{transform:translateX(-3px);}
    20%,80%{transform:translateX(4px);}
    30%,50%,70%{transform:translateX(-6px);}
    40%,60%{transform:translateX(6px);}
  }
  .lock-note{
    font-family:inherit; font-size:12px; color:var(--stamp-red); font-weight:600;
    margin-top:6px;
  }
  .stats-line{font-family:inherit;font-size:14px;color:var(--muted);margin-top:18px;text-align:center;}

  .word-display{text-align:center;margin:18px 0 10px;}
  .pos-tag{
    display:inline-block; font-family:inherit; font-size:13px;
    color:var(--muted); border:1px dashed #b8c8e0; padding:2px 8px; border-radius:10px;
    margin-bottom:10px; text-transform:lowercase;
  }
  .word-display .word{font-size:42px; color:var(--ink); letter-spacing:0.2px; font-weight:700;}
  input.recall-input{
    width:100%; margin-top:14px; font-family:inherit;
    font-size:18px; padding:12px; border:1px solid #b7c8e0; border-radius:2px;
    background:#f7fafd; color:var(--pencil); resize:vertical;
  }
  .reveal-box{
    margin-top:16px; padding:16px 16px 14px; background:#dbe6f5; border-left:3px solid var(--ink);
    font-size:18px; line-height:1.6;
  }
  .reveal-box .def-num{color:var(--ink); font-weight:bold;}
  .reveal-box .sentence{margin-top:10px; font-style:italic; color:#4a5a78; font-size:16px;}
  .feedback-banner{
    display:flex; align-items:center; gap:12px;
    padding:15px 17px; border-radius:12px;
    font-weight:800; font-size:20px;
    margin-bottom:14px;
    animation: popIn .38s cubic-bezier(.34,1.56,.64,1);
  }
  .feedback-banner .icon{
    width:36px; height:36px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:19px; color:#fff;
    animation: iconPop .45s cubic-bezier(.34,1.56,.64,1) .05s both;
  }
  .feedback-banner.correct{background:#e2f6ea; color:#1f7a43;
    box-shadow:0 8px 20px rgba(46,158,91,0.32);
    animation: popIn .38s cubic-bezier(.34,1.56,.64,1), glowPulse 1s ease .1s;}
  .feedback-banner.correct .icon{background:var(--stamp-green);}
  .feedback-banner.incorrect{background:#fbe8e6; color:#a3392b; box-shadow:0 8px 20px rgba(192,57,43,0.28);
    animation: popIn .3s ease, shake .4s ease .32s;}
  .feedback-banner.incorrect .icon{background:var(--stamp-red);}
  @keyframes popIn{
    0%{transform:scale(.7) translateY(6px); opacity:0;}
    65%{transform:scale(1.06) translateY(0); opacity:1;}
    100%{transform:scale(1);}
  }
  @keyframes iconPop{
    0%{transform:scale(0);} 70%{transform:scale(1.25);} 100%{transform:scale(1);}
  }
  @keyframes shake{
    10%,90%{transform:translateX(-2px);}
    20%,80%{transform:translateX(3px);}
    30%,50%,70%{transform:translateX(-5px);}
    40%,60%{transform:translateX(5px);}
  }
  @keyframes glowPulse{
    0%{box-shadow:0 8px 20px rgba(46,158,91,0.32);}
    45%{box-shadow:0 8px 28px rgba(46,158,91,0.6);}
    100%{box-shadow:0 8px 20px rgba(46,158,91,0.32);}
  }

  .choice-list{display:flex; flex-direction:column; gap:9px; margin-top:16px;}
  .choice{
    text-align:left; padding:14px 15px; border:1px solid #b7c8e0; border-radius:2px;
    background:#f7fafd; cursor:pointer; font-family:inherit; font-size:17px; color:var(--pencil);
  }
  .choice:hover{border-color:var(--ink);}
  .choice.correct{border-color:var(--stamp-green); background:#e3ecdf; color:#254a30;}
  .choice.wrong{border-color:var(--stamp-red); background:#f2e0da; color:#6e2a20;}
  .choice.disabled{cursor:default;}

  .progress-bar{height:5px; background:#d3ddef; border-radius:3px; overflow:hidden; margin:16px 0 4px;}
  .progress-fill{height:100%; background:var(--accent);}
  .progress-label{font-family:inherit; font-size:13px; color:var(--muted); text-align:right;}

  .timer{font-family:inherit; font-size:18px; color:var(--stamp-red); text-align:right; font-weight:700;}

  .diag-score{font-size:48px; color:var(--ink); text-align:center; margin:6px 0 2px; font-weight:700;
    animation: popIn .5s cubic-bezier(.34,1.56,.64,1);}
  .diag-sub{text-align:center; font-family:inherit; font-size:15px; color:var(--muted); margin-bottom:18px;}
  .missed-list{display:flex; flex-wrap:wrap; gap:7px; margin-top:8px;}
  .missed-chip{
    font-family:inherit; font-size:14px; background:#dbe6f5;
    border:1px solid #b7c8e0; color:var(--pencil); padding:5px 10px; border-radius:12px;
  }
  .back-link{
    display:inline-block; margin-top:20px; font-family:inherit;
    font-size:14px; color:var(--muted); cursor:pointer; text-decoration:underline;
  }
  .back-link:hover{color:var(--ink);}
  .len-row{display:flex; gap:10px; margin-top:14px; flex-wrap:wrap;}
  .record-note{font-family:inherit; font-size:14px; color:var(--muted); text-align:center; margin-top:10px;}
  ::selection{background:#c3d6f0;}
  @media(max-width:480px){
    body{padding-left:10px; padding-right:10px;}
    .masthead h1{font-size:28px;}
    .card{padding:18px 14px 16px; border-radius:14px;}
    .word-display .word{font-size:30px;}
    .btn{padding:14px 16px; font-size:14px;}
    .mode-card{padding:14px;}
    .mode-card .mtitle{font-size:17px;}
    .choice{padding:15px 14px;}
    .catalog-row{font-size:11.5px;}
    .diag-score{font-size:40px;}
  }
</style>
</head>
<body>
<div class="wrap">

</div>

/* ============ BOOK / LEVEL STRUCTURE ============
   Each book is chunked into "levels" — the batch of new words a student
   receives at a time. As more words get added to a book's array, later
   levels automatically unlock (no manual flag needed).
*/
const BOOKS = [
  { id:'leaders300', name:'Leaders 300',        words: WORDS, chunk:100, target:300 },
  { id:'leaders500', name:'Leaders 500 Final',  words: [],    chunk:100, target:500 },
  { id:'leadersAdv', name:'Leaders Advanced',   words: [],    chunk:70,  target:414 }
];
function bookLevels(book){
  const levels = [];
  let start = 0;
  while(start < book.target){
    const end = Math.min(start+book.chunk, book.target);
    levels.push({ start, end, label: `${start+1}–${end}`, available: book.words.length >= end });
    start = end;
  }
  return levels;
}
let nav = { bookId:null, levelIdx:null };
function currentBook(){ return BOOKS.find(b=>b.id===nav.bookId); }
function currentLevels(){ return bookLevels(currentBook()); }
function currentLevel(){ return currentLevels()[nav.levelIdx]; }

/* ============ UTIL ============ */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function pickRandomOthers(excludeId, count){
  const pool = WORDS.filter(w=>w.id!==excludeId);
  return shuffle(pool).slice(0,count);
}
function blankSentence(wordObj){
  const re = new RegExp(wordObj.w+"\\w*", "i");
  return wordObj.sent.replace(re, "_____");
}
function fmtDefs(wordObj){
  return wordObj.defs.map((d,i)=>{
    const num = wordObj.defs.length>1 ? `<span class="def-num">${i+1}.</span> ` : "";
    return num+d;
  }).join("<br>");
}
function numLabel(wordObj){
  return "#"+(wordObj.id+1);
}
function norm(s){
  return s.toLowerCase().replace(/[.,!?;:]+$/,"").trim();
}
// Splits a definition string like "uninterested; unconcerned; apathetic"
// into its list of interchangeable synonym phrases.
function synonymsOf(defStr){
  return defStr.split(";").map(s=>norm(s)).filter(Boolean);
}
// Checks whether a chunk of user text contains at least one of the
// definition's synonym phrases as a substring (case-insensitive).
function chunkMatchesDef(chunk, defStr){
  const c = norm(chunk);
  if(!c) return false;
  return synonymsOf(defStr).some(syn => syn.length>0 && c.includes(syn));
}
// Splits user input on leading numbering like "1." "2)" etc.
// Returns array of trimmed text chunks (no numbering).
function splitNumberedInput(input){
  const parts = input.split(/\d+[\.\)]\s*/).map(s=>s.trim()).filter(Boolean);
  return parts;
}
// Full answer checker for the "write the meaning" text-entry modes.
// Returns true/false. Handles 1-def and 2-def (multi-def) words per the
// rule: any listed synonym counts, and numbering/order don't need to match
// the book as long as each definition is covered by a distinct answer chunk.
function checkAnswer(input, wordObj){
  if(!input || !input.trim()) return false;
  const defs = wordObj.defs;
  if(defs.length===1){
    return chunkMatchesDef(input, defs[0]);
  }
  // multi-definition: need N distinct chunks, each covering a different def
  let chunks = splitNumberedInput(input);
  if(chunks.length < defs.length){
    // fallback: allow splitting on newlines if user didn't number
    chunks = input.split(/\n+/).map(s=>s.trim()).filter(Boolean);
  }
  if(chunks.length !== defs.length) return false;
  // try to find a bijection between chunks and defs (order-independent)
  function backtrack(chunkIdx, remainingDefs, used){
    if(chunkIdx === chunks.length) return remainingDefs.length===0;
    const chunk = chunks[chunkIdx];
    for(let i=0;i<remainingDefs.length;i++){
      if(chunkMatchesDef(chunk, remainingDefs[i])){
        const rest = remainingDefs.slice(0,i).concat(remainingDefs.slice(i+1));
        if(backtrack(chunkIdx+1, rest, used)) return true;
      }
    }
    return false;
  }
  return backtrack(0, defs, []);
}
function bumpMastery(id, correct){
  if(!MASTERY[id]) MASTERY[id]={seen:0,correct:0,incorrect:0};
  MASTERY[id].seen++;
  if(correct) MASTERY[id].correct++; else MASTERY[id].incorrect++;
  saveMastery(MASTERY);
}
function weakWordIds(){
  return WORDS.filter(w=>{
    const m = MASTERY[w.id];
    return m && m.incorrect > m.correct;
  }).map(w=>w.id);
}

/* ============ APP STATE / ROUTER ============ */
const app = document.getElementById('app');

async function boot(){
  MASTERY = await loadMastery();
  RECORDS = await loadRecords();
  const savedNav = await loadNav();
  if(savedNav && savedNav.bookId){
    const book = BOOKS.find(b=>b.id===savedNav.bookId);
    const levels = book ? bookLevels(book) : [];
    const lvl = levels[savedNav.levelIdx];
    if(book && book.words.length>0 && lvl && lvl.available){
      nav = savedNav;
      renderModeSelect();
      return;
    }
  }
  renderBookSelect();
}

function totalIntroduced(){
  // number of distinct words ever seen
  return Object.keys(MASTERY).length;
}

function updateMasthead(){
  const kicker = document.getElementById('kicker-label');
  const range = document.getElementById('range-label');
  if(!nav.bookId){
    kicker.textContent = "Leaders";
    range.textContent = "Choose your word list";
  } else {
    const book = currentBook();
    kicker.textContent = book.name;
    if(nav.levelIdx===null || nav.levelIdx===undefined){
      range.textContent = "Choose your current level";
    } else {
      const lvl = currentLevel();
      range.textContent = `Words ${lvl.label}`;
    }
  }
}
// Briefly shakes a locked card and shows an inline message instead of navigating.
function flashLocked(cardEl, msg){
  cardEl.classList.add('locked-shake');
  setTimeout(()=>cardEl.classList.remove('locked-shake'), 420);
  const infoDiv = cardEl.querySelector('div'); // first child holds mtitle/mdesc
  let note = infoDiv.querySelector('.lock-note');
  if(!note){
    note = document.createElement('div');
    note.className = 'lock-note';
    infoDiv.appendChild(note);
  }
  note.textContent = msg;
}

  app.innerHTML = `

    <h2 class="section-title">Choose a word list</h2>
    <div class="mode-grid">
      ${BOOKS.map((b,i)=>{
        const has = b.words.length>0;
        return `
        <div class="mode-card ${has?'':'locked'}" id="book-${b.id}" data-idx="${i}">
          <div><div class="mtitle">${b.name}</div>
          <div class="mdesc">${has? `${b.words.length}/${b.target} words added so far.` : `In progress — not added yet.`}</div></div>
          <div class="mnum">${has? '●' : '🔒'}</div>
        </div>`;
      }).join('')}
    </div>
  `;
  BOOKS.forEach(b=>{

      nav.bookId = b.id;
      renderLevelSelect();

  app.innerHTML = `
    <div class="catalog-row"><span>${book.name}</span><span>${book.words.length}/${book.target} words</span></div>

      ${levels.map((lvl,i)=>`
        <div class="mode-card ${lvl.available?'':'locked'}" id="level-${i}" data-idx="${i}">
          <div><div class="mtitle">Words ${lvl.label}</div>
          <div class="mdesc">${lvl.available? `${lvl.end-lvl.start} words.` : `Not added yet.`}</div></div>
          <div class="mnum">${lvl.available? '●' : '🔒'}</div>
        </div>`).join('')}
    </div>

  document.getElementById('back-books').onclick = renderBookSelect;
  levels.forEach((lvl,i)=>{

      if(!lvl.available){ flashLocked(el, "This section hasn't been added yet."); return; }
      nav.levelIdx = i;
      saveNav();
      renderModeSelect();
    };
  });
}

    <h2 class="section-title" style="margin-top:12px;">Choose a mode</h2>
    <div class="mode-grid">
      <div class="mode-card" id="m-learn">
        <div><div class="mtitle">Learning Mode</div>
        <div class="mdesc">This level's ${levelIds.length} words, added one at a time.<br>Words you miss show up more often.</div></div>
        <div class="mnum">01</div>
      </div>
      <div class="mode-card" id="m-test">
        <div><div class="mtitle">Full Practice Test</div>
        <div class="mdesc">This section only, or cumulative from word 1.<br>Type the definition, auto-graded.</div></div>
        <div class="mnum">02</div>
      </div>
      <div class="mode-card" id="m-quiz">
        <div><div class="mtitle">Quiz Practice</div>
        <div class="mdesc">10 random words, cumulative (1–${level.end}).<br>Same format as the real quiz.</div></div>
        <div class="mnum">03</div>
      </div>
    </div>
    <div class="stats-line">This section introduced: ${introducedThisLevel}/${levelIds.length} &nbsp;·&nbsp; Needing review (1–${level.end}): ${weakCumulative}</div>
  `;
  document.getElementById('back-levels').onclick = renderLevelSelect;
  document.getElementById('m-learn').onclick = ()=>startLearning(levelIds);
  document.getElementById('m-test').onclick = ()=>renderFullTestSetup(levelIds, cumulativeIds, level.label);
  document.getElementById('m-quiz').onclick = ()=>startQuizPractice(cumulativeIds);
}

/* ---- Sub-screen: Full Practice Test scope choice ---- */
function renderFullTestSetup(levelIds, cumulativeIds, levelLabel){
  app.innerHTML = `
    <div class="catalog-row"><span>Full Practice Test</span><span>Choose scope</span></div>
    <div class="back-link" id="back-modes">← Back</div>
    <h2 class="section-title" style="margin-top:12px;">Test which words?</h2>
    <div class="mode-grid">
      <div class="mode-card" id="scope-level">
        <div><div class="mtitle">This Section Only</div>
        <div class="mdesc">Just the ${levelIds.length} words from ${levelLabel}.</div></div>
        <div class="mnum">${levelIds.length}</div>
      </div>
      <div class="mode-card" id="scope-cumulative">
        <div><div class="mtitle">Cumulative</div>
        <div class="mdesc">Everything you've covered so far, 1–${cumulativeIds.length}.</div></div>
        <div class="mnum">${cumulativeIds.length}</div>
      </div>
    </div>
  `;
  document.getElementById('back-modes').onclick = renderModeSelect;
  document.getElementById('scope-level').onclick = ()=>startFullTest(levelIds, {label:`Full Practice Test — ${levelLabel}`});
  document.getElementById('scope-cumulative').onclick = ()=>startFullTest(cumulativeIds, {label:`Full Practice Test — Cumulative 1–${cumulativeIds.length}`});
}

/* ============ LEARNING MODE ============ */
let learnState = null;
function startLearning(levelIds){
  const ids = levelIds && levelIds.length ? levelIds.slice() : WORDS.map(w=>w.id);
  learnState = {
    allIds: ids,
    pool: [ids[0]],
    nextToAdd: 1,
    sinceAdd: 0,
    lastAsked: null,
    answered: 0,
    correct: 0,
    missed: new Set(),
    sessionSeen: new Set(),
    weights: { [ids[0]]: 1 },
    forceNextId: null
  };
  learningRound();
}
// Weighted random pick: words with higher weight (recently missed) come up
// more often, but every word in the pool always has at least a baseline
// chance, so nothing gets forgotten.
function weightedPick(poolIds, excludeId, weights){
  let candidates = poolIds.filter(id=>id!==excludeId);
  if(candidates.length===0) candidates = poolIds.slice();
  const weighted = candidates.map(id=>({id, w: Math.max(0.0001, weights[id]||1)}));
  const total = weighted.reduce((sum,c)=>sum+c.w,0);
  let r = Math.random()*total;
  for(const c of weighted){
    r -= c.w;
    if(r<=0) return c.id;
  }
  return weighted[weighted.length-1].id;
}
function learningRound(){
  const s = learnState;
  let id;
  let isFreshIntro = false;
  if(s.forceNextId !== null){
    id = s.forceNextId;
    s.forceNextId = null;
    isFreshIntro = true;
  } else {
    id = weightedPick(s.pool, s.lastAsked, s.weights);
  }
  s.lastAsked = id;
  s.sessionSeen.add(id);
  const word = WORDS[id];
  const hint = word.defs.length>1 ? `2 definitions — answer both, e.g. "1. ... 2. ..."` : `Type the definition`;
  app.innerHTML = `
    <div class="catalog-row"><span>Learning Mode</span><span>Pool: ${s.pool.length}/${s.allIds.length} introduced</span></div>
    <div class="word-display">
      <div class="pos-tag">${numLabel(word)} · ${word.pos}${isFreshIntro? ' · <span style="color:var(--accent);">NEW</span>':''}</div>
      <div class="word">${word.w}</div>
    </div>
    <input type="text" class="recall-input" id="recall" placeholder="${hint}" autocomplete="off">
    <div class="btn-row">
      <button class="btn" id="check-btn">Check Answer</button>
      <button class="btn secondary" id="end-btn">End Session</button>
    </div>
    <div id="reveal-slot"></div>
  `;
  const recallEl = document.getElementById('recall');
  recallEl.focus();
  document.getElementById('end-btn').onclick = ()=>learningDiagnostics();
  function doCheck(){
    const val = recallEl.value;
    const correct = checkAnswer(val, word);
    recallEl.disabled = true;
    document.getElementById('check-btn').disabled = true;
    document.getElementById('reveal-slot').innerHTML = `
      <div class="feedback-banner ${correct?'correct':'incorrect'}">
        <div class="icon">${correct?'✓':'✕'}</div>
        <div>${correct?'Correct!':'Not quite'}</div>
      </div>
      <div class="reveal-box">
        ${fmtDefs(word)}
        <div class="sentence">"${word.sent}"</div>
      </div>
      <div class="btn-row">
        <button class="btn" id="next-btn">Next Word</button>
      </div>
    `;
    bumpMastery(id, correct);
    document.getElementById('next-btn').onclick = ()=>{ recordLearningResult(id, correct); };
    document.getElementById('next-btn').focus();
  }
  document.getElementById('check-btn').onclick = doCheck;
  recallEl.addEventListener('keydown', e=>{
    if(e.key==='Enter'){ e.preventDefault(); doCheck(); }
  });
}
function recordLearningResult(id, correct){
  const s = learnState;
  s.answered++;
  if(correct){
    s.correct++;
    s.weights[id] = Math.max(1, (s.weights[id]||1) - 1);
  } else {
    s.missed.add(id);
    s.weights[id] = (s.weights[id]||1) + 4;
  }
  gradeLearning(id, correct);
}
function gradeLearning(id, correct){
  const s = learnState;
  s.sinceAdd++;
  if(s.sinceAdd>=3 && s.nextToAdd<s.allIds.length){
    const newId = s.allIds[s.nextToAdd];
    s.pool.push(newId);
    s.weights[newId] = 1;
    s.nextToAdd++;
    s.sinceAdd=0;
    s.forceNextId = newId; // guarantee the freshly-added word is shown next
  }
  learningRound();
}
function learningDiagnostics(){
  const s = learnState;
  const pct = s.answered? Math.round(100*s.correct/s.answered) : 0;
  const missedIds = [...s.missed];
  app.innerHTML = `
    <div class="catalog-row"><span>Learning Mode</span><span>Session Diagnostics</span></div>
    <div class="diag-score">${pct}%</div>
    <div class="diag-sub">${s.correct} / ${s.answered} known on first recall</div>
    <h2 class="section-title" style="margin-top:20px;">Words introduced this session</h2>
    <div class="diag-sub" style="text-align:left;font-size:14px;">${s.sessionSeen.size} of ${s.allIds.length} total words now introduced (${s.pool.length}/${s.allIds.length} in your active pool)</div>
    ${missedIds.length? `<h2 class="section-title" style="margin-top:20px;">Needs review</h2><div class="missed-list">${missedIds.map(id=>`<span class="missed-chip">${numLabel(WORDS[id])} ${WORDS[id].w}</span>`).join('')}</div>` : ''}
    <div class="btn-row">
      <button class="btn" id="again">Continue Learning</button>
      <button class="btn secondary" id="home">Back to Menu</button>
    </div>
  `;
  document.getElementById('again').onclick = ()=>startLearning(s.allIds);
  document.getElementById('home').onclick = renderModeSelect;
}

/* ============ FULL TEST MODE ============ */
let testState = null;
function startFullTest(ids, opts){
  opts = opts || {};
  const order = ids && ids.length ? ids.slice() : WORDS.map(w=>w.id);
  testState = { idx:0, correct:0, missed:[], order, label: opts.label || 'Full Practice Test', isQuiz: !!opts.isQuiz, quizSource: opts.quizSource || null };
  fullTestRound();
}
function startQuizPractice(cumulativeIds){
  const source = cumulativeIds && cumulativeIds.length ? cumulativeIds : WORDS.map(w=>w.id);
  const n = Math.min(10, source.length);
  const ids = shuffle(source).slice(0,n);
  startFullTest(ids, {label:'Quiz Practice', isQuiz:true, quizSource:source});
}
function fullTestRound(){
  const s = testState;
  if(s.idx>=s.order.length){ return fullTestDiagnostics(); }
  const id = s.order[s.idx];
  const word = WORDS[id];
  const hint = word.defs.length>1 ? `2 definitions — answer both, e.g. "1. ... 2. ..."` : `Write the meaning`;
  app.innerHTML = `
    <div class="catalog-row"><span>${s.label}</span><span>Card ${s.idx+1} / ${s.order.length}</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${(s.idx/s.order.length)*100}%"></div></div>
    <div class="word-display">
      <div class="pos-tag">${numLabel(word)} · ${word.pos}</div>
      <div class="word">${word.w}</div>
    </div>
    <input type="text" class="recall-input" id="recall" placeholder="${hint}" autocomplete="off">
    <div class="btn-row">
      <button class="btn" id="check-btn">Check Answer</button>
    </div>
    <div id="reveal-slot"></div>
  `;
  const recallEl = document.getElementById('recall');
  recallEl.focus();
  function doCheck(){
    const val = recallEl.value;
    const correct = checkAnswer(val, word);
    recallEl.disabled = true;
    document.getElementById('check-btn').disabled = true;
    document.getElementById('reveal-slot').innerHTML = `
      <div class="feedback-banner ${correct?'correct':'incorrect'}">
        <div class="icon">${correct?'✓':'✕'}</div>
        <div>${correct?'Correct!':'Not quite'}</div>
      </div>
      <div class="reveal-box">
        ${fmtDefs(word)}
        <div class="sentence">"${word.sent}"</div>
      </div>
      <div class="btn-row">
        <button class="btn" id="next-btn">Next Word</button>
      </div>
    `;
    document.getElementById('next-btn').onclick = ()=>gradeFullTest(id,correct);
    document.getElementById('next-btn').focus();
  }
  document.getElementById('check-btn').onclick = doCheck;
  recallEl.addEventListener('keydown', e=>{
    if(e.key==='Enter'){ e.preventDefault(); doCheck(); }
  });
}
function gradeFullTest(id, correct){
  const s = testState;
  bumpMastery(id, correct);
  if(correct) s.correct++; else s.missed.push(id);
  s.idx++;
  fullTestRound();
}
async function fullTestDiagnostics(){
  const s = testState;
  const pct = Math.round(100*s.correct/s.order.length);
  await saveLastMissed(s.missed);
  app.innerHTML = `
    <div class="catalog-row"><span>${s.label}</span><span>Diagnostics</span></div>
    <div class="diag-score">${pct}%</div>
    <div class="diag-sub">${s.correct} / ${s.order.length} correct</div>
    ${s.missed.length? `<h2 class="section-title" style="margin-top:20px;">Missed (${s.missed.length})</h2><div class="missed-list">${s.missed.map(id=>`<span class="missed-chip">${numLabel(WORDS[id])} ${WORDS[id].w}</span>`).join('')}</div>` : '<div class="diag-sub" style="margin-top:14px;">No misses. Full marks.</div>'}
    <div class="btn-row">
      ${s.missed.length? `<button class="btn red" id="retest-missed">Practice Test — Missed Words Only</button>` : ''}
      <button class="btn secondary" id="again">${s.isQuiz? 'New Quiz (10 Random)' : 'Retest All '+s.order.length}</button>
      <button class="btn secondary" id="home">Back to Menu</button>
    </div>
  `;
  if(s.missed.length) document.getElementById('retest-missed').onclick = ()=>startFullTest(s.missed);
  document.getElementById('again').onclick = s.isQuiz ? (()=>startQuizPractice(s.quizSource)) : (()=>startFullTest(s.order, {label:s.label}));
  document.getElementById('home').onclick = renderModeSelect;
}


boot();
</script>
